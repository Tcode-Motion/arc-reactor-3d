name: Deploy to GitHub Pages

on:
  # Runs every time you push to master (or main)
  push:
    branches:
      - master
      - main

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Tells next.config.ts to apply /arc-reactor-3d basePath
          NEXT_PUBLIC_GITHUB_PAGES: "1"

      - name: Add .nojekyll
        # Prevents GitHub Pages Jekyll from ignoring _next/ assets
        run: touch out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages    # creates/updates this branch automatically
          force_orphan: true          # keeps gh-pages branch clean (no history bloat)
